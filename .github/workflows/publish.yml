name: publish

# Publishes to PyPI via Trusted Publishing (OIDC) — no API tokens stored.
# Fires automatically when a GitHub Release is published; workflow_dispatch
# lets you publish the current main (e.g. an already-created release) once the
# PyPI pending publisher is registered.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/):
#   PyPI Project Name : mlx-nufft
#   Owner             : martinlachaine
#   Repository name   : mlx-nufft
#   Workflow name     : publish.yml
#   Environment name  : pypi

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest   # pure-Python (py3-none-any) wheel; no Apple HW needed to build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mlx-nufft
    permissions:
      id-token: write   # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
