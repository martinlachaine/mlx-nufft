name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    # Apple-silicon runner — mlx-nufft requires Metal/MLX (arm64).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv and install (with dev extras)
        run: |
          uv venv --python 3.13 .venv
          uv pip install -p .venv/bin/python -e ".[dev]"

      - name: Run correctness suite
        run: .venv/bin/python harness/run_tests.py
